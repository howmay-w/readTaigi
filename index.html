<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --sub: #64748b;
    --border: #e2e8f0;
    --active: #fef3c7;
    --active-border: #f59e0b;
    --gram: #d1fae5;

  }
  * { -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 130px;
  }
  header {
    background: linear-gradient(135deg, #1d4ed8, #7c3aed);
    color: white;
    padding: 18px 16px 14px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.2);
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header p { font-size: 13px; opacity: .8; margin-top: 2px; }
  .now-playing-bar {
    background: rgba(255,255,255,.15);
    border-radius: 8px;
    padding: 7px 12px;
    margin-top: 10px;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .now-playing-bar.active { display: flex; }
  .np-dot { width:8px; height:8px; background:#4ade80; border-radius:50%;
    animation: pulse 1s ease-in-out infinite; flex-shrink:0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .np-text { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600; }
  .stop-btn { background:rgba(255,255,255,.25); border:none; color:white;
    border-radius:6px; padding:5px 12px; font-size:13px; cursor:pointer; flex-shrink:0; }
  .main { padding: 12px; }
  .section-card {
    background: var(--card);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    border: 1.5px solid var(--border);
  }
  .section-title {
    width: 100%; border: none; background: none;
    padding: 13px 14px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; text-align: left;
  }
  .section-title:active { background: #eff6ff; }
  .sec-left { display: flex; align-items: center; gap: 10px; flex:1; min-width:0; }
  .sec-num {
    background: var(--primary);
    color: white;
    border-radius: 8px;
    padding: 3px 8px;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .sec-text {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
  }
  .sec-right { display:flex; align-items:center; gap:6px; flex-shrink:0; padding-left:8px; }
  .sec-parts-count { font-size:12px; color:var(--sub); }
  .arrow { font-size:22px; color:#94a3b8; transition:transform .2s; line-height:1; }
  .arrow.open { transform: rotate(90deg); }
  .parts-container { padding: 8px 10px 10px; border-top: 1px solid var(--border); }
  .part-btn, .title-audio-btn {
    width: 100%; display: flex; align-items: center; gap: 10px;
    padding: 10px 10px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    margin-bottom: 7px;
    background: var(--card);
    cursor: pointer;
    transition: all .15s;
  }
  .part-btn:active, .title-audio-btn:active { background: var(--primary-light); }
  .part-btn.playing, .title-audio-btn.playing {
    background: var(--active);
    border-color: var(--active-border);
  }
  .badge {
    min-width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0; padding: 0 5px;
  }
  .badge-num { background: #e0f2fe; color: #0369a1; }
  .badge-gram { background: var(--gram); color: var(--gram-text); }
  .badge-title { background: #f3e8ff; color: #7c3aed; font-size: 11px; }
  .part-label {
    flex: 1; font-size: 15px; color: var(--text); text-align:left;
    font-weight: 500;
  }
  .title-audio-btn .part-label { color: var(--sub); font-size:14px; }
  .play-icon { font-size: 16px; color: var(--primary); flex-shrink:0; }
  .playing .play-icon { color: var(--active-border); }
  .bottom-player {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1.5px solid var(--border);
    padding: 10px 16px 14px;
    box-shadow: 0 -4px 20px rgba(0,0,0,.12);
    display: none;
  }
  .bottom-player.visible { display: block; }
  .player-title { font-size: 13px; color: var(--sub); margin-bottom: 8px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600; }
  audio { width: 100%; height: 36px; margin-bottom: 8px; }
  .seek-row {
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .seek-btn {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: #f1f5f9; border: none; border-radius: 10px;
    padding: 7px 18px; cursor: pointer; color: var(--primary);
    font-weight: 700; font-size: 18px; line-height: 1;
    flex: 1; max-width: 120px;
    -webkit-tap-highlight-color: transparent;
  }
  .seek-btn:active { background: var(--primary-light); }
  .seek-btn span { font-size: 11px; font-weight: 500; color: var(--sub); margin-top:1px; }
  .seek-time {
    font-size: 13px; color: var(--sub); min-width: 90px;
    text-align: center; font-variant-numeric: tabular-nums;
  }
</style>
</head>

<div class="bottom-player" id="bottomPlayer">
  <div class="player-title" id="playerTitle">音檔</div>
  <audio id="mainAudio" controls preload="none"></audio>
  <div class="seek-row">
    <button class="seek-btn" onclick="seekBy(-3)">⟨⟨<span>倒退 3 秒</span></button>
    <div class="seek-time" id="seekTime">0:00 / 0:00</div>
    <button class="seek-btn" onclick="seekBy(3)">⟩⟩<span>前進 3 秒</span></button>
  </div>
</div>

<script>
let currentBtn = null;
const audio = document.getElementById('mainAudio');
const bottomPlayer = document.getElementById('bottomPlayer');
const npBar = document.getElementById('npBar');
const npText = document.getElementById('npText');
const playerTitle = document.getElementById('playerTitle');
const seekTime = document.getElementById('seekTime');

function fmt(s) {
  s = Math.max(0, Math.floor(s));
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}
audio.addEventListener('timeupdate', () => {
  const cur = audio.currentTime, dur = audio.duration || 0;
  seekTime.textContent = fmt(cur) + ' / ' + (dur ? fmt(dur) : '--:--');
});
audio.addEventListener('loadedmetadata', () => {
  seekTime.textContent = '0:00 / ' + fmt(audio.duration);
});

function seekBy(sec) {
  if (!audio.src) return;
  audio.currentTime = Math.min(Math.max(0, audio.currentTime + sec), audio.duration || 0);
}

function playAudio(btn, url) {
  if (currentBtn) {
    currentBtn.classList.remove('playing');
    currentBtn.querySelector('.play-icon').textContent = '▶';
  }
  if (currentBtn === btn && !audio.paused) {
    audio.pause();
    currentBtn = null;
    bottomPlayer.classList.remove('visible');
    npBar.classList.remove('active');
    return;
  }
  currentBtn = btn;
  btn.classList.add('playing');
  btn.querySelector('.play-icon').textContent = '⏸';

  const label = btn.querySelector('.part-label').textContent;
  playerTitle.textContent = label;
  npText.textContent = label;
  npBar.classList.add('active');
  bottomPlayer.classList.add('visible');

  audio.src = url;
  audio.load();
  audio.play().catch(e => console.log('Play error:', e));
}

audio.addEventListener('ended', () => {
  if (currentBtn) {
    currentBtn.classList.remove('playing');
    currentBtn.querySelector('.play-icon').textContent = '▶';
    currentBtn = null;
  }
  npBar.classList.remove('active');
});

function stopAudio() {
  audio.pause();
  if (currentBtn) {
    currentBtn.classList.remove('playing');
    currentBtn.querySelector('.play-icon').textContent = '▶';
    currentBtn = null;
  }
  npBar.classList.remove('active');
  bottomPlayer.classList.remove('visible');
}

function toggleSection(titleBtn) {
  const card = titleBtn.closest('.section-card');
  const container = card.querySelector('.parts-container');
  const arrow = titleBtn.querySelector('.arrow');
  const isOpen = container.style.display !== 'none';
  container.style.display = isOpen ? 'none' : 'block';
  arrow.classList.toggle('open', !isOpen);
  if (!isOpen) {
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
  }
}
</script>
